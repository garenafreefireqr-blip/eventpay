<!-- Razorpay Checkout Script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
const API_URL = "YOUR_DEPLOYED_WEB_APP_URL";

async function startPayment() {
  const name    = document.getElementById("name").value.trim();
  const phone   = document.getElementById("phone").value.trim();
  const village = document.getElementById("village").value.trim();
  const amount  = document.getElementById("amount").value.trim();

  if (!name || !phone || !amount) {
    alert("Please fill all fields");
    return;
  }

  // 1. Create order on backend
  const orderRes = await fetch(`${API_URL}?action=createOrder` +
    `&name=${encodeURIComponent(name)}` +
    `&phone=${encodeURIComponent(phone)}` +
    `&village=${encodeURIComponent(village)}` +
    `&amount=${encodeURIComponent(amount)}`);
  const order = await orderRes.json();

  if (order.error) {
    alert(order.message || order.error);
    return;
  }

  // 2. Open Razorpay checkout
  const options = {
    key: order.keyId,
    amount: order.amount,
    currency: order.currency,
    name: "EventPay Contribution",
    description: "Contribution from " + name,
    order_id: order.orderId,
    prefill: { name: name, contact: phone },
    notes: { village: village, refid: order.refid },
    theme: { color: "#6366f1" },
    handler: async function (response) {
      // 3. Verify payment on backend
      const verifyRes = await fetch(`${API_URL}?action=verifyPayment` +
        `&razorpay_order_id=${response.razorpay_order_id}` +
        `&razorpay_payment_id=${response.razorpay_payment_id}` +
        `&razorpay_signature=${response.razorpay_signature}`);
      const result = await verifyRes.json();

      if (result.success) {
        alert("✅ Payment Successful! Ref: " + result.refid);
        window.location.reload();
      } else {
        alert("⚠️ Verification failed: " + result.error);
      }
    },
    modal: {
      ondismiss: function () { console.log("Payment cancelled"); }
    }
  };

  const rzp = new Razorpay(options);
  rzp.on("payment.failed", function (resp) {
    alert("Payment failed: " + resp.error.description);
  });
  rzp.open();
}
</script>

<!-- Simple Form -->
<div class="pay-form">
  <input id="name" placeholder="Full Name" />
  <input id="phone" placeholder="Phone Number" />
  <input id="village" placeholder="Village" />
  <input id="amount" type="number" placeholder="Amount (₹)" />
  <button onclick="startPayment()">Donate Now 💳</button>
</div>
