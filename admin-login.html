<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EventPay">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: var(--bg);
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(99,102,241,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139,92,246,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.login-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.5);
  animation: fadeInUp 0.5s ease both;
  position: relative;
  overflow: hidden;
}
.login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}
.login-logo {
  text-align: center;
  margin-bottom: 28px;
}
.login-logo .lock-icon {
  width: 60px; height: 60px;
  border-radius: 18px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 14px;
  box-shadow: 0 8px 24px rgba(99,102,241,0.3);
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-6px); }
}
.login-logo h2 {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 4px;
}
.login-logo p {
  color: var(--text-muted);
  font-size: 13px;
}

.input-group {
  margin-bottom: 18px;
}
.input-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 8px;
}
.input-wrap {
  position: relative;
}
.input-wrap input {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'Sora', sans-serif;
  font-size: 15px;
  transition: all 0.2s;
  box-sizing: border-box;
}
.input-wrap input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.eye-btn {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 18px;
  color: var(--text-muted);
  padding: 4px;
  width: auto;
  transition: color 0.2s;
}
.eye-btn:hover { color: var(--text); }

.login-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border: none;
  border-radius: 14px;
  font-family: 'Sora', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
  margin-top: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.login-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.1);
  opacity: 0;
  transition: opacity 0.3s;
}
.login-btn:hover::before { opacity: 1; }
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
.login-btn:active { transform: translateY(0); }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

.login-error {
  background: rgba(239,68,68,0.12);
  border: 1px solid rgba(239,68,68,0.3);
  color: #f87171;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  margin-top: 16px;
  display: none;
  animation: fadeIn 0.3s ease;
  text-align: center;
}
.login-error.show { display: block; }

.security-note {
  margin-top: 20px;
  padding: 12px;
  background: rgba(99,102,241,0.07);
  border: 1px solid rgba(99,102,241,0.15);
  border-radius: 10px;
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.6;
}

/* LOADING OVERLAY */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(11,15,26,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
  z-index: 1000;
}
.loading-overlay.show { display: flex; }
.loading-spinner-big {
  width: 60px; height: 60px;
  border: 4px solid rgba(99,102,241,0.2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.3px;
}
.loading-dots::after {
  content: '';
  animation: dots 1.5s infinite;
}
@keyframes dots {
  0%   { content: ''; }
  25%  { content: '.'; }
  50%  { content: '..'; }
  75%  { content: '...'; }
  100% { content: ''; }
}
</style>
</head>
<body>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner-big"></div>
  <div class="loading-text">Verifying credentials<span class="loading-dots"></span></div>
</div>

<nav class="navbar">
  <div class="nav-logo">EventPay Admin</div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">← Back to App</a>
  </div>
</nav>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="lock-icon">🔐</div>
      <h2>Admin Access</h2>
      <p>Sign in to manage payments & complaints</p>
    </div>

    <div class="input-group">
      <label>Username</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="Enter username"
               autocomplete="username"
               onkeydown="if(event.key==='Enter') document.getElementById('password').focus()">
      </div>
    </div>

    <div class="input-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Enter password"
               autocomplete="current-password"
               onkeydown="if(event.key==='Enter') login()">
        <button class="eye-btn" onclick="togglePass()" id="eyeBtn">👁</button>
      </div>
    </div>

    <div class="progress-bar" id="progressBar" style="display:none; margin: 12px 0;">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="login()">
      🔓 Sign In
    </button>

    <div class="login-error" id="loginError"></div>

    <div class="security-note">
      🛡️ Access controlled via Google Sheets Admin table.<br>
      Only accounts listed there can log in.
    </div>
  </div>
</div>

<footer class="footer">
  <p>Admin access managed in Google Sheets • Session auto-expires for security</p>
</footer>

<script src="config.js"></script>
<script>
function togglePass() {
  const p = document.getElementById("password");
  const btn = document.getElementById("eyeBtn");
  p.type = p.type === "password" ? "text" : "password";
  btn.textContent = p.type === "password" ? "👁" : "🙈";
}

function showError(msg) {
  const el = document.getElementById("loginError");
  el.textContent = "⚠️ " + msg;
  el.classList.add("show");
}

function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const btn = document.getElementById("loginBtn");
  const errEl = document.getElementById("loginError");
  errEl.classList.remove("show");

  if (!username || !password) {
    showError("Please enter both username and password.");
    return;
  }

  btn.disabled = true;
  const pb = document.getElementById("progressBar");
  const pf = document.getElementById("progressFill");
  pb.style.display = "block";
  pf.style.width = "0%";
  setTimeout(() => pf.style.width = "30%", 200);
  setTimeout(() => pf.style.width = "65%", 1500);

  const data = new URLSearchParams({
    action: "loginAdmin",
    username, password
  });

  fetch(APP_CONFIG.SCRIPT_URL, { method: "POST", body: data })
    .then(r => r.json())
    .then(res => {
      pf.style.width = "100%";
      setTimeout(() => {
        pb.style.display = "none";
        btn.disabled = false;
        if (res.success) {
          sessionStorage.setItem("adminUser",     username);
          sessionStorage.setItem("adminRole",     res.role);
          sessionStorage.setItem("adminToken",    res.token);
          sessionStorage.setItem("adminExpiry",   res.expiry);
          sessionStorage.setItem("adminAccess",   res.accessLevel || "full");
          document.getElementById("loadingOverlay").classList.add("show");
          setTimeout(() => window.location.href = "admin.html", 1200);
        } else {
          showError("Invalid username or password. Check your Admin sheet.");
        }
      }, 400);
    })
    .catch(() => {
      pf.style.width = "100%";
      setTimeout(() => {
        pb.style.display = "none";
        btn.disabled = false;
        showError("Connection failed. Check your internet or Script URL in config.js");
      }, 400);
    });
}

// Auto-focus
document.getElementById("username").focus();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(r => console.log("[SW] Registered:", r.scope))
      .catch(e => console.log("[SW] Error:", e));
  });
}
</script>
</body>
</html>
